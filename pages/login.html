<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — CampusPrime</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #1d4ed8;
      --primary-dark: #1e3a8a;
      --bg: #f7f5f0;
      --white: #ffffff;
      --ink: #1a1a2e;
      --ink2: #3d3d5c;
      --muted: #8888aa;
      --border: #e2e0d8;
      --error: #dc2626;
      --error-bg: #fef2f2;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 16px 48px rgba(29,78,216,0.12);
    }
    .logo { font-size:22px; font-weight:800; color:var(--primary); margin-bottom:6px; }
    .logo span { color:var(--ink); }
    .card-title { font-size:24px; font-weight:700; color:var(--ink); margin:20px 0 6px; }
    .card-sub { font-size:13px; color:var(--muted); margin-bottom:28px; }

    .field { margin-bottom:16px; }
    label { display:block; font-size:12px; font-weight:600; color:var(--ink2); margin-bottom:6px; letter-spacing:0.3px; }
    input {
      width:100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Sora', sans-serif;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
      background: var(--bg);
    }
    input:focus { border-color: var(--primary); background: var(--white); }
    input.error-field { border-color: var(--error); }

    .error-msg {
      display:none;
      background: var(--error-bg);
      color: var(--error);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      border: 1px solid #fecaca;
    }
    .error-msg.show { display:block; }

    .forgot { text-align:right; margin-top:-8px; margin-bottom:16px; }
    .forgot a { font-size:12px; color:var(--primary); text-decoration:none; }

    .btn {
      width:100%;
      padding: 14px;
      border-radius: 10px;
      border:none;
      font-size:15px;
      font-weight:700;
      font-family:'Sora',sans-serif;
      background: var(--primary);
      color:#fff;
      cursor:pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn:active { transform:scale(0.99); }
    .btn:disabled { opacity:0.6; cursor:not-allowed; }

    .divider { text-align:center; font-size:12px; color:var(--muted); margin:20px 0; position:relative; }
    .divider::before, .divider::after {
      content:''; position:absolute; top:50%; width:38%; height:1px; background:var(--border);
    }
    .divider::before { left:0; }
    .divider::after { right:0; }

    .btn-google {
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1.5px solid var(--border);
      background:var(--white);
      color:var(--ink);
      font-size:14px;
      font-weight:600;
      font-family:'Sora',sans-serif;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition: border-color 0.2s;
    }
    .btn-google:hover { border-color:var(--primary); }

    .footer-link { text-align:center; font-size:13px; color:var(--muted); margin-top:24px; }
    .footer-link a { color:var(--primary); font-weight:600; text-decoration:none; }

    .loader {
      display:none;
      width:18px; height:18px;
      border:2px solid rgba(255,255,255,0.4);
      border-top-color:#fff;
      border-radius:50%;
      animation:spin 0.6s linear infinite;
      margin:0 auto;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">Campus<span>Prime</span></div>
  <h1 class="card-title">Welcome back</h1>
  <p class="card-sub">Sign in to your school dashboard</p>

  <div class="error-msg" id="errorMsg"></div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="principal@yourschool.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <div class="forgot">
    <a href="#" id="forgotLink">Forgot password?</a>
  </div>

  <button class="btn" id="loginBtn" onclick="handleLogin()">
    <span id="loginText">Sign In</span>
    <div class="loader" id="loginLoader"></div>
  </button>

  <div class="divider">or continue with</div>

  <button class="btn-google" onclick="handleGoogleLogin()">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4c-7.7 0-14.4 4.3-17.7 10.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.5 26.8 36 24 36c-5.2 0-9.7-2.9-11.8-7.2l-6.5 5C9.5 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.5 35.6 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
    Sign in with Google
  </button>

  <div class="footer-link">
    New to CampusPrime? <a href="signup.html">Create free account</a>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>

<script>
  // Redirect if already logged in
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = '/pages/dashboard.html';
  });

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError() { document.getElementById('errorMsg').classList.remove('show'); }

  function setLoading(on) {
    document.getElementById('loginBtn').disabled = on;
    document.getElementById('loginText').style.display = on ? 'none' : 'inline';
    document.getElementById('loginLoader').style.display = on ? 'block' : 'none';
  }

  async function handleLogin() {
    hideError();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) { showError('Please enter your email and password.'); return; }

    setLoading(true);
    try {
      await auth.signInWithEmailAndPassword(email, password);
      window.location.href = '/pages/dashboard.html';
    } catch (err) {
      setLoading(false);
      const msgs = {
        'auth/user-not-found':  'No account found with this email.',
        'auth/wrong-password':  'Incorrect password. Please try again.',
        'auth/too-many-requests': 'Too many attempts. Please try again later.',
        'auth/invalid-email':   'Please enter a valid email address.'
      };
      showError(msgs[err.code] || 'Sign in failed. Please try again.');
    }
  }

  async function handleGoogleLogin() {
    hideError();
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      const result = await auth.signInWithPopup(provider);
      // First-time Google user: create school profile
      const uid = result.user.uid;
      const schoolDoc = await db.collection('schools').doc(uid).get();
      if (!schoolDoc.exists) {
        await db.collection('schools').doc(uid).set({
          ownerName: result.user.displayName || '',
          email: result.user.email || '',
          schoolName: '',
          plan: 'trial',
          trialEndsAt: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000),
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          onboardingComplete: false
        });
        window.location.href = '/pages/onboarding.html';
        return;
      }
      window.location.href = '/pages/dashboard.html';
    } catch (err) {
      showError('Google sign-in failed. Please try again.');
    }
  }

  document.getElementById('forgotLink').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) { showError('Enter your email address above first.'); return; }
    try {
      await auth.sendPasswordResetEmail(email);
      showError(''); 
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('errorMsg').style.background = '#f0fdf4';
      document.getElementById('errorMsg').style.color = '#16a34a';
      document.getElementById('errorMsg').style.borderColor = '#bbf7d0';
      document.getElementById('errorMsg').textContent = 'Password reset email sent! Check your inbox.';
    } catch(err) {
      showError('Could not send reset email. Check the address and try again.');
    }
  });

  // Enter key
  document.addEventListener('keydown', e => { if(e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
